name: Export Android signing tools

on:
  push:
    branches:
      - agent/spotify-track-matching
    paths:
      - '.github/workflows/export-signing-tools.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Package current Android build tools
        shell: bash
        run: |
          set -euo pipefail
          latest="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          test -n "$latest"
          echo "Using $latest"
          tar -czf android-signing-tools-linux.tar.gz -C "$latest" apksigner zipalign lib

      - name: Upload signing tools
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-tools-linux
          path: android-signing-tools-linux.tar.gz
          if-no-files-found: error
          retention-days: 1
