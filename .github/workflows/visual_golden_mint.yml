# TEMPORARY — remove once committed Linux baselines gate CI in debug.yml.
#
# This workflow is NOT a regression gate. It regenerates the two visual-review
# suites' goldens with `--update-goldens` (which never fails on a mismatch) on
# the canonical gating platform (Linux/ubuntu-latest, same Flutter version as
# debug.yml) and uploads the complete generated baseline directory as an
# artifact for manual inspection and one-time commit. It intentionally does not
# analyze, run the unit suite, build an APK, or fail on visual differences.
#
# Re-created for the AppTypography-rebuild correction: that fix changes the
# validity of the previously committed canonical Linux baselines, so they must
# be re-minted and re-inspected rather than reused.
name: Visual golden mint (temporary)

on:
  workflow_dispatch:
  push:
    branches:
      - agent/full-visual-overhaul-master

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  mint:
    name: Mint visual goldens (Linux, temporary — not a gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show tool versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Mint personalized suite goldens
        run: flutter test tool/visual_review_test.dart --update-goldens

      - name: Mint priority suite goldens
        run: flutter test tool/visual_review_priority_test.dart --update-goldens

      - name: Upload generated Linux baselines
        uses: actions/upload-artifact@v4
        with:
          name: minted-visual-goldens-${{ github.run_number }}
          path: tool/visual_review_goldens/
          if-no-files-found: error
          retention-days: 7
