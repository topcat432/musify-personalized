name: Build baseline APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'agent/**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: baseline-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  build:
    name: Analyze, test, and build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Enforce the sole production release path
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for workflow in .github/workflows/*.yml .github/workflows/*.yaml; do
            case "$(basename "$workflow")" in
              debug.yml|signed-release.yml) continue ;;
            esac
            if grep -Fq -- '--flavor github' "$workflow" &&
              { grep -Fq -- 'KEYSTORE2' "$workflow" ||
                { grep -Fq -- 'flutter build apk' "$workflow" &&
                  grep -Fq -- '--release' "$workflow"; }; }; then
              echo "Legacy production-package build path found in $workflow"
              exit 1
            fi
          done

      - name: Analyze Dart code
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze . 2>&1 | tee flutter-analyze.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-${{ github.run_number }}
          path: flutter-analyze.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail on analyzer issues
        if: steps.analyze.outputs.status != '0'
        run: exit 1

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          flutter test 2>&1 | tee flutter-test.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-${{ github.run_number }}
          path: flutter-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail on test failures
        if: steps.tests.outputs.status != '0'
        run: exit 1

      - name: Render visual review screenshots
        run: >-
          flutter test tool/visual_review_test.dart
          --update-goldens

      - name: Upload visual review screenshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-review-${{ github.run_number }}
          path: tool/visual_review_goldens/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Build universal debug APK
        run: >-
          flutter build apk --debug --flavor github
          --dart-define=GIT_SHA=${{ github.sha }}

      - name: Verify debug APK output
        run: test -f build/app/outputs/flutter-apk/app-github-debug.apk

      - name: Verify debug channel identity
        shell: bash
        run: |
          set -euo pipefail
          apk=build/app/outputs/flutter-apk/app-github-debug.apk
          aapt="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 2 -maxdepth 2 -type f -name aapt | sort -V | tail -1)"
          badging="$($aapt dump badging "$apk")"
          permissions="$($aapt dump permissions "$apk")"
          grep -Fq "package: name='com.topcat432.musifypersonalized.debug'" <<<"$badging"
          grep -Fq "application-label:'Musify Personalized DEBUG'" <<<"$badging"
          grep -Fq 'android.permission.REQUEST_INSTALL_PACKAGES' <<<"$permissions"
          ! cmp -s \
            android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
            android/app/src/debug/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build and verify F-Droid permission boundary
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --debug --flavor fdroid -t lib/main_fdroid.dart
          apk=build/app/outputs/flutter-apk/app-fdroid-debug.apk
          test -f "$apk"
          aapt="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 2 -maxdepth 2 -type f -name aapt | sort -V | tail -1)"
          permissions="$($aapt dump permissions "$apk")"
          ! grep -Fq 'android.permission.REQUEST_INSTALL_PACKAGES' <<<"$permissions"

      - name: Build unsigned release APK
        shell: bash
        run: |
          set -euo pipefail
          build_number=$((200000 + GITHUB_RUN_NUMBER))
          flutter build apk \
            --release \
            --flavor github \
            --build-number "$build_number" \
            --build-name "0.1.${GITHUB_RUN_NUMBER}" \
            --dart-define=GIT_SHA="$GITHUB_SHA"

      - name: Verify unsigned release APK output
        shell: bash
        run: |
          set -euo pipefail
          apk=build/app/outputs/flutter-apk/app-github-release.apk
          test -f "$apk"
          aapt="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 2 -maxdepth 2 -type f -name aapt | sort -V | tail -1)"
          badging="$($aapt dump badging "$apk")"
          grep -Fq "package: name='com.topcat432.musifypersonalized'" <<<"$badging"
          grep -Fq "application-label:'Musify Personalized'" <<<"$badging"

      # CI builds are verification inputs only. They are deliberately not
      # uploaded because debug signing is ephemeral and unsigned releases are
      # not safe user updates. User-facing APKs come only from signed-release.
