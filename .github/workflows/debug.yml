name: Build baseline APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'agent/**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: baseline-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  build:
    name: Analyze, test, and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze . 2>&1 | tee flutter-analyze.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-${{ github.run_number }}
          path: flutter-analyze.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail on analyzer issues
        if: steps.analyze.outputs.status != '0'
        run: exit 1

      - name: Run tests
        run: flutter test

      - name: Build universal debug APK
        run: flutter build apk --debug --flavor github

      - name: Verify APK output
        run: test -f build/app/outputs/flutter-apk/app-github-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: musify-personalized-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-github-debug.apk
          if-no-files-found: error
          retention-days: 14
