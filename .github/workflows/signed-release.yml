name: Build signed production APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: signed-production-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.5'

jobs:
  release:
    name: Test and build permanently signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out selected candidate
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Validate signing secrets
        env:
          MUSIFY_SIGNING_KEY_BASE64: ${{ secrets.MUSIFY_SIGNING_KEY_BASE64 }}
          MUSIFY_SIGNING_PASSWORD: ${{ secrets.MUSIFY_SIGNING_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$MUSIFY_SIGNING_KEY_BASE64" || {
            echo "Missing MUSIFY_SIGNING_KEY_BASE64 repository secret."
            exit 1
          }
          test -n "$MUSIFY_SIGNING_PASSWORD" || {
            echo "Missing MUSIFY_SIGNING_PASSWORD repository secret."
            exit 1
          }

      - name: Restore permanent Android signing key
        env:
          MUSIFY_SIGNING_KEY_BASE64: ${{ secrets.MUSIFY_SIGNING_KEY_BASE64 }}
          MUSIFY_SIGNING_PASSWORD: ${{ secrets.MUSIFY_SIGNING_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$MUSIFY_SIGNING_KEY_BASE64" | base64 --decode > android/app/key.jks
          cat > android/key.properties <<EOF
          storePassword=$MUSIFY_SIGNING_PASSWORD
          keyPassword=$MUSIFY_SIGNING_PASSWORD
          keyAlias=musify-personalized
          EOF
          keytool -list \
            -keystore android/app/key.jks \
            -storepass "$MUSIFY_SIGNING_PASSWORD" \
            -alias musify-personalized >/dev/null

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze .

      - name: Run tests
        run: flutter test

      - name: Build signed release APK
        shell: bash
        run: |
          set -euo pipefail
          # YYDDD plus a three-digit workflow sequence is monotonic across
          # calendar days and safely above all earlier 200xxx test builds.
          day_code="$(date -u +'%y%j')"
          build_number=$((10#$day_code * 1000 + GITHUB_RUN_NUMBER % 1000))
          flutter build apk \
            --release \
            --flavor github \
            --build-number "$build_number" \
            --build-name "0.1.$build_number" \
            --dart-define=GIT_SHA="$GITHUB_SHA"

      - name: Verify signed production identity
        shell: bash
        run: |
          set -euo pipefail
          apk=build/app/outputs/flutter-apk/app-github-release.apk
          test -f "$apk"
          apksigner="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner | sort -V | tail -1)"
          test -x "$apksigner"
          verification="$($apksigner verify --verbose --print-certs "$apk")"
          printf '%s\n' "$verification"
          # V2 is the required install/update identity scheme for the target
          # Android device. V3 is optional and toolchain-dependent.
          grep -Fq 'Verified using v2 scheme (APK Signature Scheme v2): true' <<<"$verification"
          signer_sha="$(sed -n -e 's/^Signer #1 certificate SHA-256 digest: //p' -e 's/^V[0-9][^:]*: certificate SHA-256 digest: //p' <<<"$verification" | head -1)"
          test -n "$signer_sha"
          aapt="$(find "$ANDROID_SDK_ROOT/build-tools" -mindepth 2 -maxdepth 2 -type f -name aapt | sort -V | tail -1)"
          badging="$($aapt dump badging "$apk")"
          grep -Fq "package: name='com.topcat432.musifypersonalized'" <<<"$badging"
          grep -Fq "application-label:'Musify Personalized'" <<<"$badging"
          ! grep -Fq 'application-debuggable' <<<"$badging"
          cp "$apk" musify-personalized-production.apk
          sha256sum musify-personalized-production.apk > musify-personalized-production.apk.sha256
          package_line="$(head -1 <<<"$badging")"
          {
            echo "Musify Personalized production release proof"
            echo "Source commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_RUN_ID"
            echo "Signer SHA-256: $signer_sha"
            echo "APK SHA-256: $(cut -d' ' -f1 musify-personalized-production.apk.sha256)"
            echo "$package_line"
            echo "Application label: Musify Personalized"
            echo "Debuggable: false"
            echo "Signature schemes: v2=true"
          } > release-proof.txt
          cat release-proof.txt

      - name: Upload verified production candidate
        uses: actions/upload-artifact@v4
        with:
          name: musify-personalized-PRODUCTION-${{ github.run_number }}
          path: |
            musify-personalized-production.apk
            musify-personalized-production.apk.sha256
            release-proof.txt
          if-no-files-found: error
          retention-days: 30
